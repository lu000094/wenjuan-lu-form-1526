<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Top bar: wordmark -->
  <header class="topbar">
    <span class="topbar__brand">Quill</span>
  </header>

  <!-- Main content: capped at 50rem and centred in the viewport -->
  <main class="container">

    <section class="intro">
      <h1 class="intro__title">Contact Us</h1>
      <p class="intro__subtitle">
        Send us a message and we&rsquo;ll get back to you shortly.
      </p>
    </section>

    <!-- The form. Submit is type="button"; validation is wired up in js/main.js -->
    <form class="contact-form" novalidate>
      <fieldset class="card">
        <legend class="card__legend">Contact form</legend>

        <div class="grid">

          <div class="field field--name">
            <label class="field__label" for="fullname">Full Name</label>
            <span class="field__control">
              <input type="text" id="fullname" autocomplete="name">
            </span>
          </div>

          <div class="field field--email">
            <label class="field__label" for="email">Email</label>
            <span class="field__control">
              <input type="text" id="email" autocomplete="email">
            </span>
          </div>

          <div class="field field--message">
            <label class="field__label" for="message">Message</label>
            <span class="field__control">
              <textarea id="message" rows="4"></textarea>
            </span>
          </div>

          <div class="field field--actions">
            <input type="button" id="submit-button" value="Submit">
          </div>

        </div>
      </fieldset>
    </form>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
